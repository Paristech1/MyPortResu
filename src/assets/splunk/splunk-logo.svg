<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Splunk Project thumbnail">
  <defs>
    <linearGradient id="sp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0f0d"/>
    </linearGradient>
    <linearGradient id="sp-chevron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f99d1c"/>
      <stop offset="45%" stop-color="#ec1c8e"/>
      <stop offset="100%" stop-color="#65a637"/>
    </linearGradient>
    <pattern id="sp-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="600" height="400" fill="url(#sp-bg)"/>
  <rect width="600" height="400" fill="url(#sp-grid)" opacity="0.7"/>

  <!-- splunk> wordmark -->
  <g transform="translate(300 178)" text-anchor="middle">
    <text font-family="'Segoe UI', system-ui, -apple-system, Helvetica, sans-serif"
          font-weight="800" font-size="92" letter-spacing="-3" fill="#f8fafc">
      <tspan>splunk</tspan><tspan dx="6" fill="url(#sp-chevron)" font-size="104">&gt;</tspan>
    </text>
  </g>

  <!-- subtitle -->
  <text x="300" y="248" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-weight="600" font-size="20" letter-spacing="4" fill="#94a3b8">
    SIEM HOME LAB
  </text>

  <!-- event ribbon -->
  <g transform="translate(96 286)" font-family="ui-monospace, Menlo, Consolas, monospace">
    <rect x="0" y="0" width="408" height="58" rx="8" fill="rgba(15,23,42,0.92)" stroke="#334155" stroke-width="1.2"/>
    <circle cx="22" cy="29" r="5" fill="#65a637"/>
    <text x="40" y="25" font-size="13" fill="#38bdf8">index=main sourcetype=WinEventLog:Security</text>
    <text x="40" y="45" font-size="12" fill="#86efac">EventCode=4624  EventCode=4672  &#8594;  5,658 events</text>
  </g>
</svg>
