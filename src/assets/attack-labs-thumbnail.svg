<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="ATT&amp;CK Labs - MITRE ATT&amp;CK Navigator project thumbnail">
  <defs>
    <linearGradient id="attack-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="55%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <pattern id="attack-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#7f1d1d" stroke-width="0.6" opacity="0.4"/>
    </pattern>
    <filter id="attack-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="#120a0a"/>
  <rect width="600" height="400" fill="url(#attack-grid)" opacity="0.6"/>

  <text x="32" y="74" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-weight="800" font-size="40" fill="url(#attack-glow)" filter="url(#attack-soft)">ATT&amp;CK</text>
  <text x="34" y="104" font-family="ui-monospace, Consolas, monospace" font-size="15" fill="#fca5a5" letter-spacing="2">MITRE NAVIGATOR LAB</text>

